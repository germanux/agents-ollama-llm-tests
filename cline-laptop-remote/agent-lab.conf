# Shared configuration for the PC running Ollama and the laptop running Cline.
# Edit this file once. Do not add spaces around '='.

PC_IP=192.168.1.7
LAPTOP_IP=192.168.1.9
OLLAMA_PORT=11434
OLLAMA_MODEL=ornith-cline-64k

# Cline execution settings
CLINE_REQUEST_TIMEOUT_MS=300000
CLINE_TASK_TIMEOUT_SECONDS=10800
CLINE_RETRIES=20

# Node/Cline installation
NODE_VERSION=22.23.1
NVM_VERSION=0.40.5

# Firewall behavior on the PC.
# If UFW is already active, access is restricted automatically to LAPTOP_IP.
# Set true only if you want the script to enable UFW when it is inactive.
ENABLE_UFW_IF_INACTIVE=false
ALLOW_SSH_WHEN_ENABLING_UFW=true

# Informational only. Cline CLI 3.0.44 currently loads this Ollama model at 32768.
EXPECTED_REMOTE_CONTEXT=32768
